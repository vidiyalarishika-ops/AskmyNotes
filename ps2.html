<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskMyNotes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white max-w-md w-full rounded-2xl shadow-lg p-6 space-y-4">

    <header class="text-center">
      <h1 class="text-3xl font-bold text-gray-800">AskMyNotes</h1>
      <p class="text-sm text-gray-500">Ask questions about your notes</p>
    </header>

    <!-- Question Input -->
    <input
      type="text"
      id="question"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      placeholder="Type your question..."
    />

    <!-- File Upload -->
    <input
      type="file"
      id="notes"
      accept=".txt,.pdf"
      class="w-full text-sm text-gray-600"
    />

    <!-- Ask Button -->
    <button
      id="submit"
      class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">
      Ask
    </button>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden flex flex-col items-center justify-center py-4">
      <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-2 text-sm text-gray-600">Generating answer...</p>
    </div>

    <!-- Output -->
    <div
      id="output"
      class="border border-gray-200 rounded-lg p-4 text-gray-700 bg-gray-50 min-h-[80px]">
      Answer will appear here...
    </div>

  </div>

  <script>
    const submitBtn = document.getElementById("submit");
    const loading = document.getElementById("loading");
    const output = document.getElementById("output");

    submitBtn.addEventListener("click", async () => {
      const question = document.getElementById("question").value;
      const file = document.getElementById("notes").files[0];

      if (!question) {
        alert("Please enter a question.");
        return;
      }

      if (!file) {
        alert("Please upload a notes file.");
        return;
      }

      // Show spinner
      loading.classList.remove("hidden");
      submitBtn.disabled = true;
      submitBtn.classList.add("opacity-50", "cursor-not-allowed");

      output.textContent = "";

      try {
        // Replace this with your actual API call
        await new Promise(resolve => setTimeout(resolve, 3000));

        output.textContent = "This is where your AI-generated answer will appear.";
      } catch (error) {
        output.textContent = "An error occurred while generating the answer.";
      } finally {
        // Hide spinner
        loading.classList.add("hidden");
        submitBtn.disabled = false;
        submitBtn.classList.remove("opacity-50", "cursor-not-allowed");
      }
    });
  </script>

</body>
</html>
