<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AskMyNotes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 28px;
        }

        h3 {
            margin-top: 20px;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #ddd;
            border: none;
            cursor: pointer;
        }

        .answer {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        .freeze {
            position: absolute;
            top: 20px;
            left: 20px;
            background: gray;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="freeze">FREEZE</div>

<div class="container">
    <h1>AskMyNotes</h1>
    <p>Upload your notes and ask questions from them.</p>

    <h3>Upload Notes</h3>
    <label>Choose your notes file:</label><br>
    <input type="file">

    <h3>Ask a Question</h3>
    <label>Enter your question:</label><br>
    <textarea></textarea>

    <br>
    <button>Ask My Notes</button>

    <div class="answer">
        <h3>Answer</h3>
        <p>Your AI-generated answer will appear here.</p>
        <p><i>AskMyNotes Capstone Project</i></p>
    </div>
</div>

</body>
</html>
